/* ---------- JSONP loader (anti-CORS) ---------- */
function fetchJSONP(url, callback, timeout = 12000){
  const cbName = "jsonp_cb_" + Math.random().toString(36).substr(2,9);
  const script = document.createElement("script");
  let timedOut = false;

  window[cbName] = function(data){
    if(timedOut) return;
    clearTimeout(to);
    cleanup();
    callback(data);
  };

  function cleanup(){
    try{ delete window[cbName]; }catch(e){ window[cbName]=undefined; }
    if(script.parentNode) script.parentNode.removeChild(script);
  }

  script.src = url + (url.indexOf('?')>-1 ? '&' : '?') + 'callback=' + cbName;
  script.onerror = function(){ cleanup(); console.error("JSONP script error"); };
  document.body.appendChild(script);

  const to = setTimeout(()=>{ timedOut = true; cleanup(); console.error("JSONP timeout"); }, timeout);
}

/* ---------- Helpers tanggal/umur/masa ---------- */
function formatTanggalIndonesia(dateStr){
  if(!dateStr) return "-";
  const tryParse = (s)=>{
    const d = new Date(s);
    if(!isNaN(d)) return d;
    // try DD/MM/YYYY or DD-MM-YYYY
    let parts = s.includes("/")? s.split("/") : s.split("-");
    if(parts.length===3){
      const [d1,m1,y1] = parts.map(Number);
      return new Date(y1, m1-1, d1);
    }
    return null;
  };
  const dt = tryParse(dateStr);
  if(!dt) return dateStr;
  const d = String(dt.getDate()).padStart(2,"0");
  const m = String(dt.getMonth()+1).padStart(2,"0");
  const y = dt.getFullYear();
  return `${d}/${m}/${y}`;
}

function calculateAge(birthDateStr){
  if(!birthDateStr) return "-";
  const d = new Date(birthDateStr);
  if(isNaN(d)) return "-";
  const today = new Date();
  let age = today.getFullYear() - d.getFullYear();
  if (today.getMonth() < d.getMonth() || (today.getMonth()===d.getMonth() && today.getDate()<d.getDate())) age--;
  return age;
}

function getMasaKerja(tmtStr){
  if(!tmtStr) return "-";
  const tmt = new Date(tmtStr);
  if(isNaN(tmt)) return "-";
  const today = new Date();
  let years = today.getFullYear() - tmt.getFullYear();
  let months = today.getMonth() - tmt.getMonth();
  let days = today.getDate() - tmt.getDate();
  if(days < 0){ months--; const prevMonth = new Date(today.getFullYear(), today.getMonth(), 0); days += prevMonth.getDate(); }
  if(months < 0){ years--; months += 12; }
  return `${years} Tahun ${months} Bulan ${days} Hari`;
}

}

function showMemberButtons(keyword){
  memberBtnContainer.innerHTML = "";
  const selectedCategory = (document.getElementById("category-filter").value || "").toString();
  const kw = (keyword || "").toLowerCase();

  const filtered = personnelDB.filter(p=>{
    const matchKeyword = (p.nama_lengkap && p.nama_lengkap.toString().toLowerCase().includes(kw)) ||
                         (p.satker && p.satker.toString().toLowerCase().includes(kw)) ||
                         (p.nama && p.nama.toString().toLowerCase().includes(kw));
    const matchCategory = !selectedCategory || (p.kategori && p.kategori === selectedCategory);
    return matchKeyword && matchCategory;
  });

  if(filtered.length === 0){
    memberBtnContainer.innerHTML = '<span class="not-found">❌ No members found for this filter</span>';
    return;

  filtered.forEach(agent => {
    const btn = document.createElement("button");

    btn.onclick = ()=> displayAgent(agent);
    memberBtnContainer.appendChild(btn);
  });

// send ping (userID, ip, ua)
function sendOnlinePing(){
  if(!ONLINE_API || ONLINE_API.indexOf("PASTE")>-1) return;
  const ua = navigator.userAgent || "";
  const ip = clientIP || "";
  // best-effort, no waiting
  navigator.sendBeacon
    ? navigator.sendBeacon(ONLINE_API + "?action=ping&userID=" + encodeURIComponent(localUserID) + "&ip=" + encodeURIComponent(ip) + "&ua=" + encodeURIComponent(ua))
    : fetch(ONLINE_API + "?action=ping&userID=" + encodeURIComponent(localUserID) + "&ip=" + encodeURIComponent(ip) + "&ua=" + encodeURIComponent(ua)).catch(()=>{});
}

<script>
// ===== FULLSCREEN ENGINE untuk Tablet / WebView / Android =====

// Paksa fullscreen
function forceFullscreen() {
  const elem = document.documentElement;
  if (elem.requestFullscreen) elem.requestFullscreen().catch(()=>{});
  else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
  else if (elem.msRequestFullscreen) elem.msRequestFullscreen();
}

// Deteksi mode aplikasi
function isAppMode() {
  return (
    window.matchMedia('(display-mode: standalone)').matches ||
    window.navigator.standalone === true ||
    navigator.userAgent.includes("wv") ||
    navigator.userAgent.includes("Android") ||
    navigator.userAgent.includes("Tablet")
  );
}

// =====================================
// 1) AUTO FULLSCREEN saat halaman dibuka
// =====================================
window.addEventListener("load", () => {
  if (isAppMode()) {
    setTimeout(forceFullscreen, 500);
  }
});

// ===================================================
// 2) FULLSCREEN saat TAP PERTAMA (syarat browser modern)
// ===================================================
document.addEventListener("click", () => {
  forceFullscreen();
}, { once: true });

// =======================================================
// 3) FULLSCREEN saat pindah halaman melalui function goTo()
// =======================================================
const originalGoTo = window.goTo;
window.goTo = function(url){
  forceFullscreen();                // masuk fullscreen dulu
  setTimeout(()=> { originalGoTo(url); }, 200); // baru pindah halaman
};

// =================================================================
// 4) FULLSCREEN saat pindah halaman via link <a> (kalau suatu hari kamu pakai)
// =================================================================
document.querySelectorAll("a").forEach(a=>{
  a.addEventListener("click", ()=>{
    forceFullscreen();
  });
});

// =============================================
// 5) FULLSCREEN saat halaman kembali tampil (pageshow)
// =============================================
window.addEventListener("pageshow", () => {
  if (isAppMode()) setTimeout(forceFullscreen, 400);
});
</script>

--------------------------- */

/*  
   SYSTEM:
   — Mengecek file “emergency.txt” di Google Drive (via Apps Script)
   — Jika ada tulisan "ON", alarm aktif
   — Jika "OFF" alarm mati
   — Dicek otomatis setiap 4 detik
*/

const EMERGENCY_API = "https://script.google.com/macros/s/AKfycbyP3MyiNRHb5WuFhqo3pJLcHdbQ21Ic90ScWJpv4_RB7iWZlgA/exec";  // <<< GANTI PUNYA MU

let emergencyState = false;
let alarmAudio = null;

/* Ambil status emergency */
function checkEmergency(){
  fetch(EMERGENCY_API + "?action=status")
    .then(r => r.json())
    .then(res => {
      if(!res || !res.status) return;

      const newState = (res.status === "ON");

      // kalau status berubah
      if(newState !== emergencyState){
        emergencyState = newState;
        handleEmergency(newState);
      }
    })
    .catch(()=>{});
}

/* ---------------------------
   Handle tampilan & suara
--------------------------- */
function handleEmergency(active){
  if(active){
    blinkButton(true);
    playAlarm();
    console.warn("🚨 EMERGENCY BOX ACTIVE");
  } else {
    blinkButton(false);
    stopAlarm();
    console.log("✔ EMERGENCY CLEARED");
  }
}

/* ---------------------------
   Efek tombol berkedip
--------------------------- */
function blinkButton(active){
  const btn = document.querySelector("button[onclick=\"goTo('emergencybox.html')\"]");
  if(!btn) return;

  if(active){
    btn.style.animation = "blinkText 0.5s infinite";
    btn.style.borderColor = "#FF0000";
    btn.style.color = "#FF0000";
  } else {
    btn.style.animation = "";
    btn.style.borderColor = "#00FF00";
    btn.style.color = "#00FF00";
  }
}

/* ---------------------------
   Suara alarm
--------------------------- */
function playAlarm(){
  if(!alarmAudio){
    alarmAudio = new Audio("alarm.mp3"); // ====> siapkan file alarm.mp3 di root
    alarmAudio.loop = true;
  }
  alarmAudio.volume = 1;
  alarmAudio.play().catch(()=>{});
}

function stopAlarm(){
  if(alarmAudio){
    alarmAudio.pause();
    alarmAudio.currentTime = 0;
  }
}

/* ---------------------------
   Stop manual via server
--------------------------- */
function stopEmergency(){
  fetch(EMERGENCY_API + "?action=off")
    .then(r=>r.json())
    .then(res=>{
      alert("✔ EMERGENCY OFF (SERVER)");
    })
    .catch(()=>{ alert("Gagal kirim OFF"); });
}

/* ---------------------------
   AUTO TIAP 4 DETIK
--------------------------- */
setInterval(checkEmergency, 4000);
window.addEventListener("load", checkEmergency);
checkEmergency(); // cek langsung saat load
</script>

const btn = document.querySelector("button[onclick=\"goTo('emergencybox.html')\"]");
const alarm = document.getElementById("alarm-sound");

// nilai saat terakhir user sudah lihat
let lastSeen = localStorage.getItem("emergency_last_seen") || "0";

function check() {
  fetch(API + "?action=fileCount", { cache: "no-store" })
    .then(r => r.text())
    .then(count => {
      count = count.trim();

      if (count !== lastSeen) {
        // ada file baru
        btn.style.background = "#FF0000";
        btn.style.animation = "blink 1s infinite";
        alarm.play();
      } else {
        // tidak ada file baru
        btn.style.background = "transparent";
        btn.style.animation = "none";
        alarm.pause();
        alarm.currentTime = 0;
      }
    });
}

setInterval(check, 5000);
check();

// css blink
const style = document.createElement("style");
style.textContent = `
@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.2; }
}
`;
document.head.appendChild(style);

const emergencyBtn = document.querySelector("button[onclick=\"goTo('emergencybox.html')\"]");
const alarmAudio = new Audio("biohazard-alarm-143105.mp3");
alarmAudio.loop = true;
let lastSeen = localStorage.getItem("emergency_last_seen") || "0";

// cek file baru tiap 5 detik
setInterval(() => {
    fetch("API_EMERGENCYBOX_URL?action=fileCount", { cache: "no-store" })
      .then(r => r.text())
      .then(count => {
          count = count.trim();
          if (count !== lastSeen) {
              emergencyBtn.style.background = "#FF0000";
              emergencyBtn.style.animation = "blink 1s infinite";
              alarmAudio.play();
          } else {
              emergencyBtn.style.background = "transparent";
              emergencyBtn.style.animation = "none";
              alarmAudio.pause();
              alarmAudio.currentTime = 0;
          }
      }).catch(()=>{});
}, 5000);

// klik tombol → alarm berhenti & tombol normal
emergencyBtn.addEventListener("click", () => {
    alarmAudio.pause();
    alarmAudio.currentTime = 0;
    emergencyBtn.style.animation = "none";
    emergencyBtn.style.background = "transparent";
    emergencyBtn.style.borderColor = "#00FF00";
    emergencyBtn.style.color = "#00FF00";

    lastSeen = Date.now();
    localStorage.setItem("emergency_last_seen", lastSeen);

    goTo('emergencybox.html');
});

</script>
    <script>
function tampilkanTanggal() {
  const now = new Date();

  const hari = String(now.getDate()).padStart(2, '0');
  const bulan = String(now.getMonth() + 1).padStart(2, '0');
  const tahun = now.getFullYear();

  const jam = String(now.getHours()).padStart(2, '0');
  const menit = String(now.getMinutes()).padStart(2, '0');
  const detik = String(now.getSeconds()).padStart(2, '0');

  const format = `${hari}-${bulan}-${tahun} ${jam}:${menit}:${detik}`;

  document.getElementById("tanggal").textContent = format;
}

// update tiap detik biar live
setInterval(tampilkanTanggal, 1000);
tampilkanTanggal();
const monitorVideo = document.getElementById("monitor-video");

function openFullscreen(el) {
  if (el.requestFullscreen) {
    el.requestFullscreen();
  } else if (el.webkitRequestFullscreen) { // Safari
    el.webkitRequestFullscreen();
  } else if (el.msRequestFullscreen) { // IE/Edge lama
    el.msRequestFullscreen();
  }
}

monitorVideo.addEventListener("click", () => {
  openFullscreen(monitorVideo);
});
</script>
