<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WARMIE MENU</title>

<style>
body{
    margin:0;
    background:#000;
    color:#fff;
    font-family:Arial;
}

/* HEADER */
header{
    text-align:right;
    padding:10px;
    background:#111;
}
.judul{
    font-size:40px;
}
.subjudul{
    color:#aaa;
}

/* ===== MENU CARD ===== */
.menu{
    display:flex;
    gap:20px;
    padding:20px;
    border-bottom:1px solid #333;
}

/* FOTO */
.menu img{
    width:220px;
    height:160px;
    object-fit:cover;
    border:2px solid #0f0;
}

/* KONTEN KANAN */
.menu-content{
    flex:1;
}

.menu-content h2{
    color:gold;
    margin:0;
}

.menu-content p{
    font-size:14px;
    color:#ccc;
}

/* QTY */
.qty-box{
    display:flex;
    align-items:center;
    gap:10px;
    margin-top:10px;
}

button{
    width:35px;
    height:35px;
    background:#444;
    color:#fff;
    border:none;
    font-size:18px;
    cursor:pointer;
}

.qty{
    min-width:30px;
    text-align:center;
    color:gold;
}

/* TOPPING */
.topping{
    margin-top:10px;
    display:flex;
    gap:10px;
}

.topping-item{
    text-align:center;
}

.topping-item img{
    width:60px;
    height:60px;
    border:2px solid #0f0;
    object-fit:cover;
}

</style>
</head>

<body>

<header>
    <div class="judul">WARMIE</div>
    <div class="subjudul">ABANG-DEDE REBORN</div>
</header>

<!-- ===== MENU 1 ===== -->
<div class="menu">

    <img src="mie jebew.jpg">

    <div class="menu-content">
        <h2>MIE JEBEW</h2>
        <p>Mie pedas gurih khas WARMIE</p>

        <!-- TOPPING -->
        <div class="topping">
            <div class="topping-item">
                <img src="bakso.jpg">
                <div class="qty-box">
                    <button onclick="minus('bakso')">-</button>
                    <span id="bakso">0</span>
                    <button onclick="plus('bakso')">+</button>
                </div>
            </div>

            <div class="topping-item">
                <img src="telur.jpg">
                <div class="qty-box">
                    <button onclick="minus('telur')">-</button>
                    <span id="telur">0</span>
                    <button onclick="plus('telur')">+</button>
                </div>
            </div>
        </div>

        <!-- MENU QTY -->
        <div class="qty-box">
            <button onclick="minus('jebew')">-</button>
            <span id="jebew">0</span>
            <button onclick="plus('jebew')">+</button>
        </div>

    </div>
</div>

<!-- ===== MENU 2 ===== -->
<div class="menu">
    <img src="mie yamin.jpg">

    <div class="menu-content">
        <h2>MIE YAMIN</h2>
        <p>manis gurih</p>

        <div class="qty-box">
            <button onclick="minus('yamin')">-</button>
            <span id="yamin">0</span>
            <button onclick="plus('yamin')">+</button>
        </div>
    </div>
</div>

<script>
function plus(id){
    document.getElementById(id).innerText++;
}

function minus(id){
    let el = document.getElementById(id);
    let val = parseInt(el.innerText);
    if(val > 0) el.innerText--;
}
</script>

</body>
</html>
