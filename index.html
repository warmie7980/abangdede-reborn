<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halaman Background Hitam</title>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #000; color: #fff; font-family: Arial, sans-serif; min-height: 100vh; }
        header { background-color: #111; padding: 20px; border-bottom: 1px solid #333; }
        .h1 { text-align: right; font-size: 30px; font-family: Courier new; colour: #00ff00; magrgin: 0px }
        .h2 { text-align: right; font-size: 75px; font-family: Courier new; colour: #00ff00; magrgin: 0px }
        main { display: flex; justify-content: left; align-items: center; height: calc(100vh - 80px); text-align: left; }
        .container { max-width: 600px; padding: 20px; }
        button { margin-top: 20px; padding: 10px 20px; background: #fff;  color: #000;  border: none;   border-radius: 5px;
        cursor: pointer; font-weight: bold; display: flex; gap: 10px; }
        button:hover { background: #ccc; }
        .datetime { position: fixed; top: 10px; left: 10px; color: yellow; font-size: 12px; font-weight: bold; z-index: 1000;
        white-space: nowrap; font-family: Courier new; }
    </style>
</head>
<body>
    <div class="datetime" id="datetime"></div>
    <header>
        <h1>WARMIE</h1>
        <h1>ABANG-DEDE REBORN</h1>
    </header>
    <main>
        <div class="container">
            <h2>MIE JEBEW</h2>
            <p>terbuat dari </p>
            <button>MIE JEBEW</button><button>MIE YAMIN</button><button>MIE ORIGINAL</button>
        </div>
    </main>
<script>
function updateDateTime() {
    const now = new Date();
    const tanggal = now.toLocaleDateString('id-ID', {
        weekday: 'long',
        day: '2-digit',
        month: 'long',
        year: 'numeric'
    });
    const waktu = now.toLocaleTimeString('id-ID');
    document.getElementById('datetime').textContent =
        `${tanggal} | ${waktu}`;
}
updateDateTime();
setInterval(updateDateTime, 1000);
</script>
</body>    
</html>
