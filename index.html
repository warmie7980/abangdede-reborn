<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halaman Background Hitam</title>

    <style>
        * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background-color: #000;
    color: #fff;
    font-family: Arial, sans-serif;
    min-height: 100vh;
}

/* DATE TIME */
.datetime {
    position: fixed;
    top: 10px;
    left: 10px;
    color: yellow;
    font-size: 12px;
    font-weight: bold;
    font-family: "Courier New", monospace;
    white-space: nowrap;
    z-index: 1000;
}

/* HEADER */
header {
    background-color: #111;
    padding: 30px;
    border-bottom: 1px solid #333;
    text-align: right;
}

.judul {
    font-family: "Courier New", monospace;
    font-size: 40px;
    color: #696969;
    margin: 0;
}

.subjudul {
    font-family: "Courier New", monospace;
    font-size: 60px;
    color: #A9A9A9;
    margin: 0;
}

/* CONTENT */
main {
    padding: 50px;
}

.container {
    max-width: 800px;
}

.container h2 {
    font-family: "Courier New", monospace;
    font-size: 42px;
    margin-bottom: 20px;
    color: #ffd700;
}

.container p {
    font-size: 18px;
    line-height: 1.6;
    margin-bottom: 30px;
    font-family: Courier New;
}

/* BUTTON */
button {
    padding: 12px 24px;
    margin-right: 10px;
    background: #0000FF;
    color: #FFFFE0;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-weight: bold;
}

button:hover {
    background: #ccc;
}
.image-box {
    width: 400px;
    height: 250px;
    border: 2px solid #00ff00;
    background-color: #111;
    color: #666;
    font-family: "Courier New", monospace;
    display: flex;
    justify-content: center;
    align-items: center;
    margin-bottom: 25px;
}
.image-box img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}
.image-box-bottom {
    width: 400px;
    height: 250px;
    border: 2px solid #ff0000;
    background-color: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    margin-top: 25px;
}

.image-box-bottom img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}
</style>
</head>
<body>
    <div class="datetime" id="datetime"></div>
    <header>
        <h1 class="judul">WARMIE</h1>
        <h1 class="subjudul">ABANG-DEDE REBORN</h1>
    </header>
    <main>
    <div class="container">

        <div class="image-box">
            <img src="mie jebew.jpg" alt="Mie Jebew">
        </div>        

        <h2>MIE YAMIN</h2>

        <p>
        Mie Yamin dengan rasa manis gurih khas, mie kenyal dipadukan dengan bumbu spesial yang lembut di lidah dan bikin nagih.
        </p>

        <button>MIE YAMIN</button>

        <div class="image-box-bottom">
            <img src="mie yamin.jpg" alt="Mie Yamin">
        </div>
    </div>
</main>
<script>
function updateDateTime() {
    const now = new Date();
    const tanggal = now.toLocaleDateString('id-ID', {
        weekday: 'long',
        day: '2-digit',
        month: 'long',
        year: 'numeric'
    });
    const waktu = now.toLocaleTimeString('id-ID');
    document.getElementById('datetime').textContent =
        `${tanggal} | ${waktu}`;
}
updateDateTime();
setInterval(updateDateTime, 1000);
</script>
</body>    
</html>
