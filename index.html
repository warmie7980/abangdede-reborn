<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halaman Background Hitam</title>

    <style>
        * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background-color: #000;
    color: #fff;
    font-family: Arial, sans-serif;
    min-height: 100vh;
}

/* DATE TIME */
.datetime {
    position: fixed;
    top: 10px;
    left: 10px;
    color: yellow;
    font-size: 12px;
    font-weight: bold;
    font-family: "Courier New", monospace;
    white-space: nowrap;
    z-index: 1000;
}

/* HEADER */
header {
    background-color: #111;
    padding: 30px;
    border-bottom: 1px solid #333;
    text-align: right;
}

.judul {
    font-family: "Courier New", monospace;
    font-size: 40px;
    color: #00ff00;
    margin: 0;
}

.subjudul {
    font-family: "Courier New", monospace;
    font-size: 60px;
    color: #00ff00;
    margin: 0;
}

/* CONTENT */
main {
    padding: 50px;
}

.container {
    max-width: 800px;
}

.container h2 {
    font-family: "Courier New", monospace;
    font-size: 42px;
    margin-bottom: 20px;
    color: #ffd700;
}

.container p {
    font-size: 18px;
    line-height: 1.6;
    margin-bottom: 30px;
}

/* BUTTON */
button {
    padding: 12px 24px;
    margin-right: 10px;
    background: #fff;
    color: #000;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-weight: bold;
}

button:hover {
    background: #ccc;
}
</style>
</head>
<body>
    <div class="datetime" id="datetime"></div>
    <header>
        <h1 class="judul">WARMIE</h1>
        <h1 class="subjudul">ABANG-DEDE REBORN</h1>
    </header>
    <main>
    <div class="container">
        <h2>MIE JEBEW</h2>

        <p>
            Mie Jebew adalah perpaduan mie kenyal, bumbu pedas gurih khas WARMIE,
            dan topping pilihan yang menghasilkan sensasi pedas, nikmat,
            dan bikin ketagihan.
        </p>

        <button>MIE JEBEW</button>
        <button>MIE YAMIN</button>
        <button>MIE ORIGINAL</button>
    </div>
</main>
<script>
function updateDateTime() {
    const now = new Date();
    const tanggal = now.toLocaleDateString('id-ID', {
        weekday: 'long',
        day: '2-digit',
        month: 'long',
        year: 'numeric'
    });
    const waktu = now.toLocaleTimeString('id-ID');
    document.getElementById('datetime').textContent =
        `${tanggal} | ${waktu}`;
}
updateDateTime();
setInterval(updateDateTime, 1000);
</script>
</body>    
</html>
