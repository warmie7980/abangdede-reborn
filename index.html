<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WARMIE</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    color:#fff;
    font-family:Arial;
}

/* HEADER */
header{
    background:#111;
    padding:20px;
    text-align:right;
    border-bottom:1px solid #333;
}

.judul{
    font-size:40px;
    font-family:Courier New;
}

.subjudul{
    font-size:20px;
    color:#aaa;
}

/* MENU BLOCK */
.menu{
    display:flex;
    gap:20px;
    margin:40px;
    align-items:flex-start;
}

.image-box img{
    width:250px;
    height:180px;
    object-fit:cover;
    border:2px solid #00ff00;
}

/* RIGHT SIDE */
.right{
    flex:1;
}

h2{
    color:#ffd700;
    font-family:Courier New;
}

p{
    margin:10px 0;
}

/* TOPPING */
.topping{
    display:flex;
    gap:10px;
    margin-top:10px;
}

.item{
    text-align:center;
}

.item img{
    width:70px;
    height:70px;
    border:2px solid #00ff00;
}

/* QTY */
.qty-box{
    display:flex;
    justify-content:center;
    gap:5px;
    margin-top:5px;
}

button{
    padding:5px 10px;
    background:#444;
    color:#fff;
    border:none;
    cursor:pointer;
}

/* POPUP */
.popup{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.8);
    justify-content:center;
    align-items:center;
}

.popup-content{
    background:#111;
    padding:20px;
    border:2px solid #00ff00;
    width:300px;
}

input{
    width:100%;
    margin:5px 0;
    padding:8px;
    background:#000;
    color:#fff;
    border:1px solid #00ff00;
}
</style>
</head>

<body>

<header>
    <div class="judul">WARMIE</div>
    <div class="subjudul">ABANG-DEDE REBORN</div>
</header>

<!-- MENU 1 -->
<div class="menu">

    <div class="image-box">
        <img src="mie jebew.jpg">
    </div>

    <div class="right">
        <h2>MIE JEBEW</h2>
        <p>Mie pedas favorit WARMIE.</p>

        <div class="topping">
            <div class="item">
                <img src="bakso.jpg">
                <div class="qty-box">
                    <button onclick="min('bakso')">-</button>
                    <span id="bakso">0</span>
                    <button onclick="plus('bakso')">+</button>
                </div>
            </div>

            <div class="item">
                <img src="telur.jpg">
                <div class="qty-box">
                    <button onclick="min('telur')">-</button>
                    <span id="telur">0</span>
                    <button onclick="plus('telur')">+</button>
                </div>
            </div>
        </div>

        <button onclick="openForm()">PESAN</button>
    </div>
</div>

<!-- POPUP -->
<div class="popup" id="popup">
    <div class="popup-content">
        <h3>DATA PEMBELI</h3>
        <input id="nama" placeholder="Nama">
        <input id="alamat" placeholder="Alamat">
        <input id="telp" placeholder="No HP">
        <button onclick="kirim()">KIRIM</button>
    </div>
</div>

<script>
let qty = {
    bakso:0,
    telur:0
};

function plus(item){
    qty[item]++;
    document.getElementById(item).innerText = qty[item];
}

function min(item){
    if(qty[item]>0){
        qty[item]--;
        document.getElementById(item).innerText = qty[item];
    }
}

function openForm(){
    document.getElementById("popup").style.display="flex";
}

function kirim(){
    let nama = document.getElementById("nama").value;
    let alamat = document.getElementById("alamat").value;
    let telp = document.getElementById("telp").value;

    let msg = `ORDER WARMIE
Nama:${nama}
Alamat:${alamat}
Telp:${telp}
Bakso:${qty.bakso}
Telur:${qty.telur}`;

    window.open("https://wa.me/62895401287059?text="+encodeURIComponent(msg));

    location.reload();
}
</script>

</body>
</html>
