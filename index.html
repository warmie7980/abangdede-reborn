<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WARMIE DESIGN</title>

<style>
body{
    margin:0;
    background:#000;
    color:#fff;
    font-family:Arial;
}

/* HEADER */
header{
    text-align:right;
    padding:15px;
    background:#111;
}
header h1{
    margin:0;
    font-size:32px;
}
header p{
    margin:0;
    color:#aaa;
}

/* CONTAINER */
.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

/* CARD MENU */
.menu-card{
    display:flex;
    gap:20px;
    background:#111;
    padding:15px;
    border-radius:10px;
    margin-bottom:20px;
}

/* FOTO */
.menu-card img{
    width:180px;
    height:130px;
    object-fit:cover;
    border-radius:10px;
    border:2px solid #0f0;
}

/* KONTEN */
.menu-info{
    flex:1;
}

/* JUDUL */
.menu-title{
    font-size:20px;
    color:gold;
    margin:0;
}

/* DESKRIPSI */
.menu-desc{
    font-size:13px;
    color:#ccc;
    margin-top:5px;
}

/* QTY */
.qty-box{
    display:flex;
    align-items:center;
    gap:10px;
    margin-top:10px;
}

.qty-box button{
    width:35px;
    height:35px;
    border:none;
    background:#444;
    color:#fff;
    font-size:18px;
    cursor:pointer;
    border-radius:5px;
}

.qty{
    min-width:25px;
    text-align:center;
    color:gold;
    font-size:18px;
}

/* TOPPING BOX */
.topping-box{
    margin-top:10px;
    background:#000;
    padding:10px;
    border:1px solid #333;
    border-radius:8px;
}

.topping-title{
    font-size:13px;
    color:#ffd700;
    margin-bottom:10px;
}

/* TOPPING ITEM */
.topping-row{
    display:flex;
    gap:10px;
}

.topping-item{
    text-align:center;
}

.topping-item img{
    width:60px;
    height:60px;
    object-fit:cover;
    border:2px solid #0f0;
    border-radius:5px;
}

.topping-item .qty-box{
    justify-content:center;
    margin-top:5px;
}
</style>
</head>

<body>

<header>
    <h1>WARMIE</h1>
    <p>Abang - Dede Reborn</p>
</header>

<div class="container">

    <!-- MENU 1 -->
    <div class="menu-card">

        <img src="mie jebew.jpg">

        <div class="menu-info">

            <h2 class="menu-title">MIE JEBEW</h2>
            <p class="menu-desc">Mie pedas gurih khas WARMIE</p>

            <div class="qty-box">
                <button>-</button>
                <span class="qty">0</span>
                <button>+</button>
            </div>

            <div class="topping-box">
                <div class="topping-title">EXTRA TOPPING</div>

                <div class="topping-row">

                    <div class="topping-item">
                        <img src="bakso.jpg">
                        <div class="qty-box">
                            <button>-</button>
                            <span class="qty">0</span>
                            <button>+</button>
                        </div>
                    </div>

                    <div class="topping-item">
                        <img src="telur.jpg">
                        <div class="qty-box">
                            <button>-</button>
                            <span class="qty">0</span>
                            <button>+</button>
                        </div>
                    </div>

                </div>
            </div>

        </div>
    </div>

    <!-- MENU 2 -->
    <div class="menu-card">

        <img src="mie yamin.jpg">

        <div class="menu-info">

            <h2 class="menu-title">MIE YAMIN</h2>
            <p class="menu-desc">Manis gurih khas</p>

            <div class="qty-box">
                <button>-</button>
                <span class="qty">0</span>
                <button>+</button>
            </div>

        </div>
    </div>

</div>

</body>
</html>
