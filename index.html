<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WARMIE CART</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    color:#fff;
    font-family:Courier New;
}

/* HEADER */
header{
    background:#111;
    padding:20px;
    text-align:right;
    border-bottom:1px solid #333;
}

.judul{font-size:40px;}
.subjudul{font-size:50px;color:#aaa;}

/* MENU */
.container{
    max-width:800px;
    margin:auto;
    padding:30px;
}

.image-box{
    width:100%;
    height:220px;
    border:2px solid #00ff00;
    margin:15px 0;
}

.image-box img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* ACTION */
.menu-action{
    display:flex;
    gap:10px;
    align-items:center;
    margin-bottom:30px;
}

button{
    padding:10px;
    cursor:pointer;
    border:none;
}

.pesan{background:#1e90ff;color:#fff;}

.minus,.plus{
    width:40px;
    height:40px;
    background:#444;
    color:#fff;
}

.qty{
    color:yellow;
    min-width:20px;
    text-align:center;
}

/* POPUP */
.popup{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.7);
    justify-content:center;
    align-items:center;
}

.popup-content{
    background:#111;
    padding:20px;
    border:1px solid #00ff00;
    width:300px;
}

.popup-content input{
    width:100%;
    margin:5px 0;
    padding:8px;
    background:#000;
    color:#fff;
    border:1px solid #333;
}
</style>
</head>

<body>

<header>
    <div class="judul">WARMIE</div>
    <div class="subjudul">ABANG-DEDE REBORN</div>
</header>

<div class="container">

<!-- MIE JEBEW -->
<h2>MIE JEBEW</h2>
<div class="image-box"><img src="mie jebew.jpg"></div>
<div class="menu-action">
<button class="pesan" onclick="tambah('MIE JEBEW')">PESAN</button>
<button class="minus" onclick="kurang('MIE JEBEW')">-</button>
<div class="qty" id="q-jebew">0</div>
<button class="plus" onclick="tambah('MIE JEBEW')">+</button>
</div>

<!-- MIE YAMIN -->
<h2>MIE YAMIN</h2>
<div class="image-box"><img src="mie yamin.jpg"></div>
<div class="menu-action">
<button class="pesan" onclick="tambah('MIE YAMIN')">PESAN</button>
<button class="minus" onclick="kurang('MIE YAMIN')">-</button>
<div class="qty" id="q-yamin">0</div>
<button class="plus" onclick="tambah('MIE YAMIN')">+</button>
</div>

<!-- MIE ORIGINAL -->
<h2>MIE ORIGINAL</h2>
<div class="image-box"><img src="mie original.jpg"></div>
<div class="menu-action">
<button class="pesan" onclick="tambah('MIE ORIGINAL')">PESAN</button>
<button class="minus" onclick="kurang('MIE ORIGINAL')">-</button>
<div class="qty" id="q-original">0</div>
<button class="plus" onclick="tambah('MIE ORIGINAL')">+</button>
</div>

</div>

<!-- POPUP FORM -->
<div class="popup" id="form">
<div class="popup-content">
<h3>DATA PEMBELI</h3>
<input id="nama" placeholder="Nama">
<input id="alamat" placeholder="Alamat">
<input id="telp" placeholder="No HP">
<button onclick="lanjut()">OK</button>
</div>
</div>

<script>
let cart = {
"MIE JEBEW":0,
"MIE YAMIN":0,
"MIE ORIGINAL":0
};

let selected="";

function tambah(menu){
cart[menu]++;
update(menu);
selected=menu;
document.getElementById("form").style.display="flex";
}

function kurang(menu){
if(cart[menu]>0) cart[menu]--;
update(menu);
}

function update(menu){
if(menu==="MIE JEBEW") document.getElementById("q-jebew").innerText=cart[menu];
if(menu==="MIE YAMIN") document.getElementById("q-yamin").innerText=cart[menu];
if(menu==="MIE ORIGINAL") document.getElementById("q-original").innerText=cart[menu];
}

function lanjut(){
let nama=document.getElementById("nama").value;
let alamat=document.getElementById("alamat").value;
let telp=document.getElementById("telp").value;

if(!nama||!alamat||!telp){
alert("ISI LENGKAP!");
return;
}

let pesan=`WARMIE ORDER\n\nNama:${nama}\nAlamat:${alamat}\nTelp:${telp}\n\n`;

let total=0;
for(let m in cart){
if(cart[m]>0){
pesan+=`${m} x${cart[m]}\n`;
total+=cart[m]*12000;
}
}

pesan+=`\nTOTAL: Rp ${total}`;

let url="https://wa.me/628XXXXXXXXXX?text="+encodeURIComponent(pesan);
window.open(url,"_blank");

reset();
}

function reset(){
cart={"MIE JEBEW":0,"MIE YAMIN":0,"MIE ORIGINAL":0};
update("MIE JEBEW");
update("MIE YAMIN");
update("MIE ORIGINAL");
document.getElementById("form").style.display="none";
}
</script>

</body>
</html>
