<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WARMIE ABANG-DEDE REBORN</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    color:#00FF00;
    font-family:'Courier New', monospace;
    height:100vh;
    overflow:hidden;
}

/* DATE/TIME kiri atas */
.date-time{
    position:fixed;
    top:10px;
    left:15px;
    color:#FFFF00;
    font-size:12px;
    z-index:1000;
}

/* RECORDING kiri atas */
.recording{
    position:fixed;
    top:30px;
    left:15px;
    color:#FF0000;
    font-size:15px;
    font-weight:bold;
    animation:blink 1s infinite;
    z-index:1000;
}

/* Teks utama naik ke atas tapi tetap tengah */
.header-center{
    position:absolute;
    top:0px;
    left:50%;
    transform:translateX(-50%);
    text-align:center;
    width:100%;
}

.title{
    font-size:60px;
    line-height:0.9;
    color:#00FF00;
}

.subtitle{
    font-size:60px;
    line-height:0.9;
    color:#00FF00;
}

.address{
    margin-top:8px;
    font-size:18px;
    color:#FF0000;
    animation:blink 1s infinite;
}

@keyframes blink{
    0%,50%,100%{
        opacity:1;
    }
    25%,75%{
        opacity:0;
    }
}

@media(max-width:768px){

    .title,
    .subtitle{
        font-size:32px;
    }

    .address{
        font-size:13px;
        padding:0 10px;
    }
}
</style>
</head>
<body>

<div class="date-time">
    DATE/TIME : <span id="tanggal"></span>
</div>

<div class="recording">
    ● RECORDING
</div>

<div class="header-center">
    <h1 class="title">WARMIE</h1>
    <h1 class="subtitle">ABANG-DEDE REBORN</h1>

    <div class="address">
       DAFTAR MENU
    </div>
</div>

<script>
function tampilkanTanggal() {
    const now = new Date();

    const hari = String(now.getDate()).padStart(2, '0');
    const bulan = String(now.getMonth() + 1).padStart(2, '0');
    const tahun = now.getFullYear();

    const jam = String(now.getHours()).padStart(2, '0');
    const menit = String(now.getMinutes()).padStart(2, '0');
    const detik = String(now.getSeconds()).padStart(2, '0');

    const format =
        `${hari}-${bulan}-${tahun} ${jam}:${menit}:${detik}`;

    document.getElementById("tanggal").textContent = format;
}

setInterval(tampilkanTanggal, 1000);
tampilkanTanggal();
</script>

</body>
</html>
